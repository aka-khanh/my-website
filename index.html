
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giới thiệu bản thân</title>
    <style>
        body {
            background: linear-gradient(135deg, #e0f7ff 0%, #ffffff 100%);
            text-align: center;
            margin: 0;
            padding: 50px 20px;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #333;
        }
        body {
            background-color: #e0f2f1; /* Màu xanh nước biển nhạt cực dịu mắt */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            max-width: 600px;
            margin: 0 auto;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        ul {
            display: inline-block;
            text-align: left;
            background: #f9f9f9;
            padding: 20px 40px;
            border-radius: 10px;
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #f0f0f0;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style> 
</head>
<body>
    <div class="container">
    <img src="anh-aka-khanh.jpg" class="profile-img">
        <h1>Giới thiệu bản thân</h1>
        <ul>
            <li><strong>Tên:</strong> Nguyễn Minh Khánh</li>
            <li><strong>Tuổi:</strong> 25</li>
            <li><strong>Sở thích:</strong> Lập trình, du lịch, đọc sách</li>
            <li><strong>Kỹ năng:</strong> JavaScript, Python, HTML/CSS</li>
            <li><strong>Mục tiêu nghề nghiệp:</strong> Trở thành một nhà phát triển web chuyên nghiệp</li>
        </ul>
    </div>
</html>
